<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damruwala | Homepage</title>
    <!-- PREMIUM FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:ital,wght@0,500;0,700;1,600;1,800&display=swap" rel="stylesheet">
    
    <style>
        /* APP MULTI-PAGE STYLING */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #f1f3f6; 
            color: #111111;
            max-width: 450px; 
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* FLIPKART STYLE BLUE NAVBAR */
        .dukaan-header {
            background: linear-gradient(180deg, #2874f0 0%, #1a62d6 100%);
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .dukaan-header h2 { font-family: 'Poppins', sans-serif; font-style: italic; font-size: 20px; }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        /* STORE CONTENT CONTAINER */
        .store-content {
            padding: 20px 16px;
            flex-grow: 1;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #212121;
        }

        /* PRODUCT CARDS DESIGN */
        .product-card {
            background: white; 
            border-radius: 8px; 
            padding: 16px; 
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #e0e0e0;
        }
        .product-info h4 { font-size: 15px; color: #212121; margin-bottom: 4px; font-weight: 600; }
        .product-info .price { color: #2874f0; font-weight: 700; font-size: 16px; }
        
        .btn-buy {
            background: #fb641b; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            font-weight: 700; 
            font-size: 13px;
            border-radius: 4px; 
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(251,100,27,0.2);
            text-transform: uppercase;
        }
        .btn-buy:active { background: #e65916; }

        /* LOADING OVERLAY SCREEN */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 3000; display: none;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2874f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* DYNAMIC POPUP MODAL (CHECKOUT FORM FOR GUESTS) */
        .guest-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
            z-index: 2000; display: none; padding: 16px;
        }
        .guest-modal-content {
            background: white; padding: 24px 20px; border-radius: 16px; width: 100%; max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; color: #212121; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 6px; font-weight: 600; color: #666; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #2874f0; }
        
        .btn-submit-order { width: 100%; background: #fb641b; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 700; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-cancel-modal { width: 100%; background: none; border: none; margin-top: 12px; color: #878787; font-weight: 600; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SCREEN SAVER LOADER -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- DUKAAN HEAD NAVIGATION BAR -->
    <div class="dukaan-header">
        <h2 id="welcomeUser">Damruwala Shop</h2>
        <button class="logout-btn" onclick="logoutSession()">LOGOUT</button>
    </div>

    <!-- MAIN DUKAAN PRODUCTS SECTION -->
    <div class="store-content">
        <h3 class="section-title">🔥 Trending Collections</h3>

        <!-- Product Item 1 -->
        <div class="product-card">
            <div class="product-info">
                <h4>Premium Trendy Shirt</h4>
                <p class="price">₹499</p>
            </div>
            <button class="btn-buy" onclick="handleOrderPlacement()">Buy Now</button>
        </div>

        <!-- Product Item 2 -->
        <div class="product-card">
            <div class="product-info">
                <h4>Stylish Baggy Jeans</h4>
                <p class="price">₹699</p>
            </div>
            <button class="btn-buy" onclick="handleOrderPlacement()">Buy Now</button>
        </div>
        
        <!-- Product Item 3 -->
        <div class="product-card">
            <div class="product-info">
                <h4>Oversized Anime Hoodie</h4>
                <p class="price">₹899</p>
            </div>
            <button class="btn-buy" onclick="handleOrderPlacement()">Buy Now</button>
        </div>
    </div>

    <!-- MANDATORY CHECKOUT MODAL BOX FOR GUESTS -->
    <div class="guest-modal" id="guestCheckoutModal">
        <div class="guest-modal-content">
            <h3 class="modal-title">Delivery Details 🚚</h3>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="custName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="custPhone" placeholder="10-digit mobile number">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="custEmail" placeholder="Enter your email ID">
            </div>

            <button class="btn-submit-order" onclick="submitGuestOrderData()">Confirm & Place Order</button>
            <button class="btn-cancel-modal" onclick="closeCheckoutModal()">Cancel</button>
        </div>
    </div>

    <!-- CORE FUNCTIONAL SCRIPT BLOCK -->
    <script>
        // AAPKI WEB APP KI GOOGLE SHEET LIPI URL
        const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbyGeG25_0a7zTdqijaYypgA0WJTIWs0g93zHfjw25gq1oipLSIlPdfbm_asIWwQKPSYcA/exec";

        // 1. STRICT GATEKEEPER SECURITY CHECK (Runs immediately when page loads)
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isUserLoggedIn');
            const isGuest = localStorage.getItem('isGuestMode');

            // Agar na toh user logged in hai aur na hi guest mode active hai, toh bhej do login screen par
            if (isLoggedIn !== 'true' && isGuest !== 'true') {
                window.location.href = 'login index.html';
                return;
            }

            // Welcome Text Change Karo Dashboard Par
            if (isGuest === 'true') {
                document.getElementById('welcomeUser').innerText = "Damruwala (Guest Mode) 🌟";
            } else {
                const name = localStorage.getItem('customerName') || "User";
                document.getElementById('welcomeUser').innerText = "Hello, " + name + " 👋";
            }
        });

        // 2. BUY NOW ONCLICK HANDLE CONTROLLER
        function handleOrderPlacement() {
            const isGuest = localStorage.getItem('isGuestMode');
            
            if (isGuest === 'true') {
                // Agar guest user hai, toh checkout form popup modal open karo
                document.getElementById('guestCheckoutModal').style.display = 'flex';
            } else {
                // Agar pehle se Google Se Logged In hai, toh direct successful message
                alert("🎉 Order Placed Successfully!\nThank you for shopping with Damruwala.");
            }
        }

        // 3. GUEST FORM VALIDATION AND SPREADSHEET DISPATCH
        function submitGuestOrderData() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const email = document.getElementById('custEmail').value.trim();

            // Form Validation Rules
            if (!name) { alert("⚠️ Please enter your Name."); return; }
            if (!phone || !/^[6-9]\d{9}$/.test(phone)) { alert("⚠️ Please enter a valid 10-digit mobile number."); return; }
            if (!email || !email.includes('@')) { alert("⚠️ Please enter a valid Email ID."); return; }

            // Show Loading Spinner
            document.getElementById('loadingOverlay').style.display = 'flex';

            // Prepare Payload for Google Sheets
            const payload = { 
                customerId: "DAMRU_GUEST_ORDER", 
                name: name, 
                email: email, 
                phone: phone 
            };
            
            fetch(GOOGLE_SHEET_API, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('guestCheckoutModal').style.display = 'none';
                
                // Guest ko permanent system status data de do taaki bar-bar form na mangey
                localStorage.setItem('isGuestMode', 'false');
                localStorage.setItem('isUserLoggedIn', 'true');
                localStorage.setItem('customerName', name);
                localStorage.setItem('userMobileNumber', phone);

                alert("🎉 Success!\nYour delivery details are saved and order is placed successfully.");
                
                // Header refresh text updates
                document.getElementById('welcomeUser').innerText = "Hello, " + name + " 👋";
            })
            .catch((err) => {
                console.error("Sheet Connection Error", err);
                document.getElementById('loadingOverlay').style.display = 'none';
                alert("⚠️ Kuch technical issue ke karan details save nahi ho payi, kripya dobara koshish karein.");
            });
        }

        // CLOSE MODAL AND LOGOUT FUNCTIONS
        function closeCheckoutModal() { 
            document.getElementById('guestCheckoutModal').style.display = 'none'; 
        }

        function logoutSession() { 
            localStorage.clear(); 
            window.location.href = 'login index.html'; 
        }
    </script>
</body>
</html>
