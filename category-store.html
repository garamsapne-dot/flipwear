<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipWear | Category Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #f1f3f6; color: #212121; }
        .header-nav { background: #2874f0; padding: 12px 10%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; color: #ffffff; font-style: italic; text-decoration: none; }
        .logo span { color: #ffe500; }
        .action-link { color: #ffffff; text-decoration: none; font-weight: 700; font-size: 15px; }
        .store-body-wrapper { max-width: 1240px; margin: 20px auto; padding: 0 15px; }
        .active-category-title-header { font-size: 22px; font-weight: 700; background: #fff; padding: 15px; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 18px; }
        .products-showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
        .product-commercial-card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 14px; cursor: pointer; display: flex; flex-direction: column; height: 380px; justify-content: space-between; }
        .product-commercial-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.12); border-color: #2874f0; }
        .product-image-container-frame { height: 210px; width: 100%; display: flex; align-items: center; justify-content: center; background: #ffffff; overflow: hidden; margin-bottom: 8px; }
        .product-image-container-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-brand-title { font-size: 13px; font-weight: 700; color: #878787; text-transform: uppercase; }
        .product-item-fullname { font-size: 14px; color: #212121; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
        .product-pricing-flex-row { display: flex; align-items: center; gap: 8px; }
        .item-current-price { font-size: 16px; font-weight: 700; }
        .item-original-slashed-price { font-size: 13px; color: #878787; text-decoration: line-through; }
        .item-active-discount-percentage { font-size: 13px; color: #388e3c; font-weight: 700; }
        .empty-store-notice-card { background: white; padding: 50px; text-align: center; border-radius: 4px; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="index.html" class="logo">Flip<span>Wear</span></a>
        <a href="admin.html" class="action-link">⚙️ Admin Panel</a>
    </div>

    <div class="store-body-wrapper">
        <div class="active-category-title-header" id="dynamicCategoryPageHeading">Loading...</div>
        <div class="products-showcase-grid" id="masterCategoryProductsGridSlot"></div>
    </div>

    <script>
        const masterProductsStockDatabase = [
            { id: 'ts1', category: 'half_tshirt', brand: 'PUMA', name: 'Classic Half Baju Regular T-Shirt', price: 499, originalPrice: 999, discount: '50% off', image: 'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=400&q=80' },
            { id: 'ts2', category: 'down_shoulder', brand: 'OVERLAYS', name: 'Heavyweight Down-Shoulder Streetwear Tee', price: 699, originalPrice: 1499, discount: '53% off', image: 'https://images.unsplash.com/photo-1562157873-818bc0726f68?auto=format&fit=crop&w=400&q=80' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const targetingKey = localStorage.getItem('currentCategoryKey') || 'half_tshirt';
            const targetingTitle = localStorage.getItem('currentCategoryTitle') || 'Half Baju T-Shirt';

            document.getElementById('dynamicCategoryPageHeading').innerText = `Showing Results for: ${targetingTitle}`;

            const adminCustomItems = JSON.parse(localStorage.getItem('myCustomStoreItems')) || [];
            const totalCombinedStock = [...masterProductsStockDatabase, ...adminCustomItems];
            const filteredArray = totalCombinedStock.filter(product => product.category === targetingKey);
            const UI_Container = document.getElementById('masterCategoryProductsGridSlot');

            if (filteredArray.length === 0) {
                UI_Container.innerHTML = `<div class="empty-store-notice-card">🛍️ No items found in this category.</div>`;
                return;
            }

            UI_Container.innerHTML = filteredArray.map(item => {
                const safeTitle = item.name.replace(/'/g, "\\'");
                const safeBrand = item.brand.replace(/'/g, "\\'");
                return `
                    <div class="product-commercial-card" onclick="openProductDetail('${item.id}', '${safeBrand}', '${safeTitle}', ${item.price}, ${item.originalPrice}, '${item.discount}', '${item.image}')">
                        <div class="product-image-container-frame"><img src="${item.image}"></div>
                        <div>
                            <div class="product-brand-title">${item.brand}</div>
                            <div class="product-item-fullname">${item.name}</div>
                            <div class="product-pricing-flex-row">
                                <span class="item-current-price">₹${item.price}</span>
                                <span class="item-original-slashed-price">₹${item.originalPrice}</span>
                                <span class="item-active-discount-percentage">${item.discount}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        });

        function openProductDetail(id, brand, name, price, originalPrice, discount, image) {
            const productSpecs = { id, brand, name, price, originalPrice, discount, productImage: image };
            localStorage.setItem('selectedProductDetails', JSON.stringify(productSpecs));
            window.location.href = 'product-detail.html';
        }
    </script>
</body>
</html>
